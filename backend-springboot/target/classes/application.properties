spring.application.name=farmer-crop-investment-system
server.port=8080

#spring.datasource.url=jdbc:mysql://localhost:3306/farmer_crop_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=root

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:farmer_crop_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origin=http://localhost:4200
